<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Play</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .page {
    position: relative;
    width: 100vmin;
    max-width: 100vw;
    aspect-ratio: 9 / 16;
    margin: 0 auto;
    height: 100vh;
    max-height: calc(100vw * 16 / 9);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #0a0a0a;
  }

  /* Ambient noise grain */
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.3;
    pointer-events: none;
    z-index: 1;
  }

  .bg-glow {
    position: absolute;
    width: 60%;
    height: 60%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Center button group */
  .center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .play-btn {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.6);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, transform 0.2s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .play-btn::after {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    animation: pulse-ring 2.4s ease-out infinite;
  }

  .play-btn:active {
    transform: scale(0.94);
  }

  .play-btn svg {
    width: 28px;
    height: 28px;
    fill: rgba(255,255,255,0.85);
    margin-left: 4px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    font-weight: 400;
    user-select: none;
  }

  @keyframes pulse-ring {
    0%   { transform: scale(1); opacity: 0.5; }
    80%  { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  /* Video overlay */
  .video-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .video-overlay.active {
    display: flex;
  }

  .video-overlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 200;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .close-btn.active {
    display: flex;
  }
</style>
</head>
<body>

<div class="page">
  <div class="bg-glow"></div>
  <div class="center">
    <button class="play-btn" id="playBtn" aria-label="Play video">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="6,3 20,12 6,21"/>
      </svg>
    </button>
    <span class="label">Play</span>
  </div>

  <div class="video-overlay" id="videoOverlay">
    <video id="vid" src="https://res.cloudinary.com/dglh7iwwb/video/upload/q_auto/f_auto/v1778930624/0516_ofnelq.mov"
      playsinline
      preload="none"
    ></video>
  </div>

  <button class="close-btn" id="closeBtn" aria-label="Close video">&#x2715;</button>
</div>

<script>
  const playBtn = document.getElementById('playBtn');
  const overlay = document.getElementById('videoOverlay');
  const vid = document.getElementById('vid');
  const closeBtn = document.getElementById('closeBtn');

  function openVideo() {
    overlay.classList.add('active');
    closeBtn.classList.add('active');
    vid.play().catch(() => {});
  }

  function closeVideo() {
    vid.pause();
    vid.currentTime = 0;
    overlay.classList.remove('active');
    closeBtn.classList.remove('active');
  }

  playBtn.addEventListener('click', openVideo);
  closeBtn.addEventListener('click', closeVideo);
  vid.addEventListener('ended', closeVideo);
</script>
</body>
</html>
